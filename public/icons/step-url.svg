<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Hand-drawn browser window with link -->
  <rect x="16" y="22" width="88" height="68" rx="6" stroke="rgba(255,255,255,0.35)" stroke-width="1.2" stroke-dasharray="none" fill="none"/>
  <!-- Title bar -->
  <line x1="16" y1="38" x2="104" y2="38" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Dots in title bar -->
  <circle cx="28" cy="30" r="2.5" fill="rgba(255,107,53,0.6)"/>
  <circle cx="37" cy="30" r="2.5" fill="rgba(255,255,255,0.15)"/>
  <circle cx="46" cy="30" r="2.5" fill="rgba(255,255,255,0.15)"/>
  <!-- URL bar -->
  <rect x="54" y="26" width="42" height="8" rx="4" stroke="rgba(255,255,255,0.15)" stroke-width="0.8" fill="none"/>
  <!-- Link chain icon in center -->
  <path d="M52 62 C52 55, 58 52, 62 56 L68 62" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M68 58 C68 65, 62 68, 58 64 L52 58" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Small content lines -->
  <line x1="30" y1="48" x2="62" y2="48" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-linecap="round"/>
  <line x1="30" y1="53" x2="50" y2="53" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-linecap="round"/>
  <line x1="30" y1="74" x2="90" y2="74" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-linecap="round"/>
  <line x1="30" y1="79" x2="74" y2="79" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-linecap="round"/>
  <!-- Cursor arrow -->
  <path d="M78 50 L78 66 L83 62 L89 72" stroke="rgba(255,107,53,0.5)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
