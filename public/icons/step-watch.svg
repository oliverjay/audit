<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Hand-drawn play/watch with audio waves -->
  <!-- Screen/viewport -->
  <rect x="20" y="24" width="80" height="54" rx="4" stroke="rgba(255,255,255,0.3)" stroke-width="1.2" fill="none"/>
  <!-- Play triangle -->
  <path d="M52 44 L52 60 L66 52 Z" stroke="rgba(255,107,53,0.6)" stroke-width="1.3" stroke-linejoin="round" fill="rgba(255,107,53,0.08)"/>
  <!-- Scan line / hotspot highlight -->
  <rect x="28" y="34" width="24" height="12" rx="2" stroke="rgba(255,255,255,0.12)" stroke-width="0.8" fill="none" stroke-dasharray="3 2"/>
  <rect x="72" y="56" width="20" height="10" rx="2" stroke="rgba(255,255,255,0.12)" stroke-width="0.8" fill="none" stroke-dasharray="3 2"/>
  
  <!-- Audio waveform below -->
  <line x1="30" y1="90" x2="30" y2="96" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="87" x2="36" y2="99" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="42" y1="84" x2="42" y2="102" stroke="rgba(255,107,53,0.4)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="48" y1="86" x2="48" y2="100" stroke="rgba(255,107,53,0.35)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="54" y1="89" x2="54" y2="97" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y1="85" x2="60" y2="101" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="66" y1="83" x2="66" y2="103" stroke="rgba(255,107,53,0.45)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="72" y1="87" x2="72" y2="99" stroke="rgba(255,107,53,0.35)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="78" y1="89" x2="78" y2="97" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="84" y1="86" x2="84" y2="100" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="90" y1="90" x2="90" y2="96" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Voiceover speech lines -->
  <path d="M76 38 L82 36" stroke="rgba(255,255,255,0.15)" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M76 42 L84 42" stroke="rgba(255,255,255,0.12)" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M76 46 L80 48" stroke="rgba(255,255,255,0.1)" stroke-width="0.8" stroke-linecap="round"/>
</svg>
