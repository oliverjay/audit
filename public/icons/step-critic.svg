<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Hand-drawn personas / selection cards -->
  <!-- Card 1 (left, slightly back) -->
  <rect x="14" y="34" width="36" height="52" rx="5" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none" transform="rotate(-4 32 60)"/>
  <circle cx="32" cy="50" r="7" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none"/>
  <line x1="22" y1="64" x2="42" y2="64" stroke="rgba(255,255,255,0.1)" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="25" y1="69" x2="39" y2="69" stroke="rgba(255,255,255,0.07)" stroke-width="0.8" stroke-linecap="round"/>
  
  <!-- Card 2 (center, selected/front) -->
  <rect x="42" y="28" width="36" height="56" rx="5" stroke="rgba(255,255,255,0.45)" stroke-width="1.4" fill="rgba(255,255,255,0.02)"/>
  <circle cx="60" cy="46" r="9" stroke="rgba(255,107,53,0.5)" stroke-width="1.3" fill="none"/>
  <!-- Face features -->
  <circle cx="57" cy="44.5" r="1" fill="rgba(255,255,255,0.3)"/>
  <circle cx="63" cy="44.5" r="1" fill="rgba(255,255,255,0.3)"/>
  <path d="M57 48.5 Q60 51 63 48.5" stroke="rgba(255,255,255,0.25)" stroke-width="0.8" stroke-linecap="round" fill="none"/>
  <line x1="50" y1="61" x2="70" y2="61" stroke="rgba(255,255,255,0.15)" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="52" y1="66" x2="68" y2="66" stroke="rgba(255,255,255,0.1)" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="54" y1="71" x2="66" y2="71" stroke="rgba(255,255,255,0.07)" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Checkmark -->
  <path d="M64 76 L67 79 L73 72" stroke="rgba(255,107,53,0.6)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Card 3 (right, slightly back) -->
  <rect x="70" y="34" width="36" height="52" rx="5" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none" transform="rotate(4 88 60)"/>
  <circle cx="88" cy="50" r="7" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none"/>
  <line x1="78" y1="64" x2="98" y2="64" stroke="rgba(255,255,255,0.1)" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="81" y1="69" x2="95" y2="69" stroke="rgba(255,255,255,0.07)" stroke-width="0.8" stroke-linecap="round"/>
</svg>
